<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Student Management System — Login">
    <title>Login — Smart Student Management System</title>
    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================================ -->
    <!-- LOGIN PAGE                                                    -->
    <!-- ============================================================ -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo / Branding -->
            <div class="logo">
                <div class="logo-icon">🎓</div>
                <h1>Student Management</h1>
                <p>Sign in to access the dashboard</p>
            </div>

            <!-- Error Message Area -->
            <div id="loginAlert" class="alert alert-error" role="alert"></div>

            <!-- Login Form -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="Enter your username" required>
                    <span class="input-icon">👤</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password" required>
                    <span class="input-icon">🔒</span>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In
                </button>
            </form>

            <!-- Demo Credentials Hint -->
            <p style="text-align:center; margin-top:20px; font-size:.8125rem; color:var(--text-muted);">
                Demo credentials: <strong style="color:var(--accent);">admin</strong> /
                <strong style="color:var(--accent);">admin123</strong>
            </p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
